<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDX ISSI Screener — Zeta Signal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__mark">issi</span><span class="topbar__mark topbar__mark--accent">/screener</span>
    </div>
    <div class="topbar__actions">
      <button id="btnOpenSignalModal" class="btn btn--primary">+ Tempel Sinyal</button>
      <button id="btnManageIssi" class="btn btn--ghost">Kelola ISSI</button>
      <button id="btnRefresh" class="btn btn--ghost">Refresh</button>
    </div>
  </header>

  <main class="layout">
    <section class="signals-panel">
      <div class="signals-panel__toolbar">
        <h1 class="signals-panel__title">Sinyal</h1>
        <div class="filter-group" id="filterHalal">
          <button class="filter-chip filter-chip--active" data-filter="halal">Halal</button>
          <button class="filter-chip" data-filter="non-halal">Non-halal</button>
          <button class="filter-chip" data-filter="all">Semua (riset)</button>
        </div>
        <span id="signalCount" class="signals-panel__count"></span>
      </div>
      <div id="signalsGrid" class="signals-grid"></div>
      <p id="emptyState" class="empty-state" hidden>Belum ada sinyal tersimpan. Klik "+ Tempel Sinyal" untuk mulai.</p>
    </section>
  </main>

  <div id="signalModal" class="modal" hidden>
    <div class="modal__card modal__card--wide">
      <div class="modal__head">
        <h2>Tempel sinyal Telegram</h2>
        <button id="btnCloseSignalModal" class="modal__close" aria-label="Tutup">&times;</button>
      </div>
      <p class="modal__hint">Paste teks dari grup Zeta IDX Signal (dari desktop atau HP, format apapun bisa).</p>
      <textarea id="rawInput" class="modal__textarea modal__textarea--tall" placeholder="🇮🇩 ZETA IDX STOCK SIGNAL 🇮🇩&#10;Saham: BBCA&#10;..."></textarea>
      <div class="modal__row">
        <button id="btnParse" class="btn btn--primary">Parse &amp; Simpan</button>
      </div>
      <div id="parseResult" class="parse-result"></div>
    </div>
  </div>

  <div id="issiModal" class="modal" hidden>
    <div class="modal__card">
      <div class="modal__head">
        <h2>Kelola daftar ISSI</h2>
        <button id="btnCloseIssiModal" class="modal__close" aria-label="Tutup">&times;</button>
      </div>
      <p class="modal__hint">Satu kode ticker per baris, atau dipisah koma.</p>
      <textarea id="issiInput" class="modal__textarea"></textarea>
      <div class="modal__row">
        <button id="btnSaveIssi" class="btn btn--primary">Simpan</button>
      </div>
      <span id="issiStatus" class="modal__status"></span>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
